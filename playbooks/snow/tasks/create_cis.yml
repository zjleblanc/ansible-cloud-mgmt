- name: Create multiple CIs in CMDB
  register: r_cis_created
  servicenow.itsm.configuration_item:
    name: "{{ _resource.name }}"
    sys_class_name: "{{ _resource.sys_class_name }}"
    ip_address: "{{ _resource.ip_address | default(omit) }}"
    mac_address: "{{ _resource.mac_address | default(omit) }}"
    serial_number: "{{ _resource.serial_number | default(omit) }}"
    other: "{{ _resource.other | default(omit) }}"

- name: Aggregate created CIs
  when: r_cis_created is defined and r_cis_created.results is defined
  loop: "{{ r_cis_created.results }}"
  loop_control:
    loop_var: _res
    label: "{{ _res.name }}"
  ansible.builtin.set_fact:
    _sn_cis_created: "{{ _sn_ci_created | default({}) | combine({ _res.record.name: _res.record }) }}"

- name: Set stats
  ansible.builtin.set_stats:
    data:
      cis_created: "{{ _sn_cis_created }}"