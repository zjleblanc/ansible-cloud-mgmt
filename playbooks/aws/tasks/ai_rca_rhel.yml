---
- name: Define RHEL diagnostic commands for RCA
  ansible.builtin.set_fact:
    ai_rca_rhel_commands:
      df_h: df -h
      df_i: df -i
      disk_usage_top: du -xh / --max-depth=1 2>/dev/null | sort -hr | head -20
      lsblk: lsblk -f
      mounts: mount
      free: free -h
      uptime: uptime
      failed_units: systemctl --failed --no-pager
      journal_errors: journalctl -p err..alert -n 100 --no-pager
      dmesg_tail: dmesg -T 2>/dev/null | tail -100
      lvm_pvs: pvs 2>/dev/null
      lvm_vgs: vgs 2>/dev/null
      lvm_lvs: lvs 2>/dev/null

- name: Run RHEL diagnostic commands on target host
  register: r_ai_rca_cmds
  loop: "{{ ai_rca_rhel_commands | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  ansible.builtin.shell: "{{ item.value }}"
  changed_when: false
  failed_when: false

- name: Build diagnostic bundle and resolve API endpoint
  ansible.builtin.set_fact:
    ai_rca_diagnostics: "{{ dict(r_ai_rca_cmds.results | map(attribute='item.key') | zip(r_ai_rca_cmds.results | map(attribute='stdout'))) }}"
    ai_rca_api_url: "{{ ai_rca_api_base if 'chat/completions' in ai_rca_api_base else ai_rca_api_base ~ '/chat/completions' }}"

- name: Build AI RCA request payload
  ansible.builtin.set_fact:
    ai_rca_user_prompt:
      host: "{{ _host }}"
      platform: "{{ host_platform | default('red hat') }}"
      issue_context: "{{ error_context | default('Disk or system health alert triggered automated remediation') }}"
      ec2_instance_id: "{{ r_instance_info.instances[0].instance_id if r_instance_info is defined else none }}"
      diagnostics: "{{ ai_rca_diagnostics }}"

- name: Request AI root cause analysis from OpenAPI-compatible endpoint
  when: ai_rca_api_key | length > 0
  register: r_ai_rca
  no_log: "{{ ai_rca_secure_logging | default(true) | bool }}"
  delegate_to: localhost
  ansible.builtin.uri:
    url: "{{ ai_rca_api_url }}"
    timeout: 60
    method: POST
    validate_certs: "{{ ai_rca_validate_certs | default(true) | bool }}"
    headers:
      Authorization: "Bearer {{ ai_rca_api_key }}"
      Content-Type: application/json
    body_format: json
    body:
      model: "llama-scout-17b"
      temperature: "{{ ai_rca_temperature | default(0.2) | float }}"
      messages:
        - role: system
          content: >-
            {{ ai_rca_system_prompt | default(
              'You are a senior Red Hat Enterprise Linux SRE. Analyze the provided '
              ~ 'host diagnostics and identify the most likely root cause of the '
              ~ 'reported issue. Respond with: (1) probable root cause, (2) supporting '
              ~ 'evidence from the data, (3) recommended remediation steps, and (4) '
              ~ 'commands to verify the fix. Be concise and actionable. Provide results in HTML not Markdown.'
            ) }}
        - role: user
          content: "{{ ai_rca_user_prompt | to_json}}"
    status_code: [200]

- name: Add AI RCA analysis to incident
  when:
    - incident_sys_id is defined
    - r_ai_rca is defined and r_ai_rca.json is defined
  delegate_to: localhost
  servicenow.itsm.incident:
    sys_id: "{{ incident_sys_id }}"
    other:
      comments: >-
        [code]
          {{ r_ai_rca.json.choices[0].message.content }}
        [/code]

- name: Request expert review of RCA
  when: ai_rca_api_key | length > 0
  register: r_ai_expert_review
  no_log: "{{ ai_rca_secure_logging | default(true) | bool }}"
  delegate_to: localhost
  vars:
    ai_expert_review_prompt:
      diagnostics: "{{ ai_rca_user_prompt }}"
      proposed_rca: "{{ r_ai_rca.json.choices[0].message.content }}"
  ansible.builtin.uri:
    url: "{{ ai_rca_api_url }}"
    timeout: 60
    method: POST
    validate_certs: "{{ ai_rca_validate_certs | default(true) | bool }}"
    headers:
      Authorization: "Bearer {{ ai_rca_api_key }}"
      Content-Type: application/json
    body_format: json
    body:
      model: "openai/deepseek-r1-distill-qwen-14b"
      temperature: "{{ ai_rca_temperature | default(0.2) | float }}"
      messages:
        - role: system
          content: >-
            {{ ai_expert_review_system_prompt | default(
              'You are an Enterprise Architect overseeing all IT infrastructure and operations. Analyze the provided '
              ~ 'host diagnostics and review the proposed RCA for accuracy and completeness. '
              ~ 'Add additional commentary and correct any errors or omissions if necessary. '
              ~ 'Do not include the original RCA in your response and provide your answer in HTML not Markdown.'
            ) }}
        - role: user
          content: "{{ ai_expert_review_prompt | to_json }}"
    status_code: [200]

- name: Add AI Expert Review to incident
  when:
    - incident_sys_id is defined
    - r_ai_expert_review is defined and r_ai_expert_review.json is defined
  delegate_to: localhost
  servicenow.itsm.incident:
    sys_id: "{{ incident_sys_id }}"
    other:
      comments: >-
        [code]
          {{ r_ai_expert_review.json.choices[0].message.content }}
        [/code]
