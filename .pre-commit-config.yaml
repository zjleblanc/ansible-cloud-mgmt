---
# https://pre-commit.com
default_install_hook_types: [pre-commit]
repos:
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        name: ansible-lint
        description: Lint all Ansible content with ansible-lint
        language_version: python3
        # ansible-lint discovers files itself; do not pass filenames
        # https://github.com/ansible/ansible-lint/issues/611
        pass_filenames: false
        # Override upstream always_run so the hook is skipped when no
        # Ansible-related files are staged. When it does run, lint still
        # covers the whole project (pass_filenames: false).
        always_run: false
        files: >-
          (?x)^(
            \.ansible-lint$|
            ansible\.cfg$|
            ansible-navigator\.ya?ml$|
            (playbooks|demos|roles|inventories|collections|tests)/|
            (filter_plugins|inventory_plugins)/.*\.py$|
            demos/(callback_plugins|filter_plugins)/.*\.py$|
            .*\.(yml|yaml)$
          )
        additional_dependencies:
          - ansible-core>=2.19.0

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Detect secrets with gitleaks
